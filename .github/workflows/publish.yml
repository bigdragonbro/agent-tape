name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # trigger on v0.1.0, v0.2.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Build distribution
        run: hatch build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # requires a "pypi" GitHub environment with the secret
    permissions:
      id-token: write          # required for trusted publishing (OIDC)

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Option A: Trusted publishing (recommended — no API token needed)
      # Set up at https://pypi.org/manage/account/publishing/
      - name: Publish (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      # Option B: API token (fallback)
      # Add PYPI_API_TOKEN to your repository secrets, then uncomment:
      # - name: Publish (API token)
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
